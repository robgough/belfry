name: Release (macOS)

# Manual only. This repo is public, so the threat model matters:
#   - Secrets are never exposed to workflows triggered by a fork's pull request
#     (GitHub blocks it), so a drive-by PR can't reach the signing identity.
#   - workflow_dispatch can only be triggered by someone with write access.
#   - The `release` environment below is where you add required reviewers, so
#     spending the Developer ID identity takes a deliberate approval.
# The Sparkle EdDSA key is deliberately NOT here: this workflow can publish a
# release, but it cannot sign an appcast, so repo write alone can never push a
# signed auto-update to every install. That step runs on Rob's Mac —
# scripts/publish_appcast.sh. See RELEASING.md.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "YYYY.MM.N (blank = next N this month, from v* tags)"
        required: false
        type: string
      dry_run:
        description: "Build, sign and notarize, but publish nothing"
        type: boolean
        default: false

# Least privilege: tag the commit and create the release. Nothing else.
permissions:
  contents: write

# Two releases at once would race on the version counter and the tag.
concurrency:
  group: release-macos
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 90
    environment: release
    steps:
      # Full history: the version counter reads v* tags and the build number is
      # `git rev-list --count HEAD`. A shallow clone silently gets both wrong.
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version

      # Inputs come from a write-access user, but they still reach a shell:
      # validate the shape rather than interpolate `${{ }}` into `run:`.
      - name: Resolve version
        id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          V="$INPUT_VERSION"
          if [ -z "$V" ]; then
            YM="$(date +%Y.%m)"
            LAST="$(git tag --list "v$YM.*" | sed "s/^v$YM\.//" | sort -n | tail -1)"
            V="$YM.$(( ${LAST:-0} + 1 ))"
            echo "› no version given — next is $V"
          fi
          case "$V" in
            [0-9][0-9][0-9][0-9].[0-9][0-9].[0-9]*) ;;
            *) echo "::error::version '$V' is not YYYY.MM.N"; exit 1 ;;
          esac
          if git rev-parse -q --verify "refs/tags/v$V" >/dev/null; then
            echo "::error::tag v$V already exists — pass an explicit version"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Check the changelog has a section for this version
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: scripts/release_notes.sh "$VERSION" > /dev/null

      - name: Test
        run: swift test

      # An ephemeral keychain that dies with the runner. Its password is random
      # and never leaves the machine, so it needn't be a secret.
      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/belfry-signing.keychain-db"
          KC_PASS="$(uuidgen)"
          P12="$RUNNER_TEMP/cert.p12"
          printf '%s' "$CERT_P12_BASE64" | base64 --decode > "$P12"
          security create-keychain -p "$KC_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PASS" "$KEYCHAIN"
          security import "$P12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          rm -f "$P12"
          # Let codesign use the key without a UI prompt. This is the right call
          # here in a way it isn't on a real Mac: the keychain is ephemeral, and
          # a CI runner has no GUI session to show a prompt to anyway.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PASS" "$KEYCHAIN" >/dev/null
          # Prepend, don't replace: dropping the login keychain breaks other tools.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          ID="$(security find-identity -v -p codesigning "$KEYCHAIN" \
                | awk '/Developer ID Application/ { print $2; exit }')"
          [ -n "$ID" ] || { echo "::error::no Developer ID Application identity in that .p12"; exit 1; }
          echo "SIGN_IDENTITY=$ID" >> "$GITHUB_ENV"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      # notarytool's keychain profile needs a GUI-created keychain; an App Store
      # Connect API key is the headless equivalent.
      - name: Stage notary credentials
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEY="$RUNNER_TEMP/asc.p8"
          printf '%s' "$ASC_KEY_P8_BASE64" | base64 --decode > "$KEY"
          chmod 600 "$KEY"
          echo "NOTARY_KEY_FILE=$KEY" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, staple
        env:
          VERSION: ${{ steps.v.outputs.version }}
          NOTARY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # make_app.sh defaults DEVELOPER_DIR to Xcode-beta, which exists on
          # hailmary and nowhere else. Point it at whatever the runner selected.
          export DEVELOPER_DIR="$(xcode-select -p)"
          scripts/release.sh "$VERSION" --skip-appcast

      # Belt and braces: the notarized zip is what users run, so assert it
      # rather than trust the build log.
      - name: Verify Gatekeeper + staple
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          rm -rf "$RUNNER_TEMP/verify" && mkdir -p "$RUNNER_TEMP/verify"
          ditto -x -k "Belfry-$VERSION.zip" "$RUNNER_TEMP/verify"
          spctl --assess --type execute -vv "$RUNNER_TEMP/verify/Belfry.app"
          xcrun stapler validate "$RUNNER_TEMP/verify/Belfry.app"
          lipo -archs "$RUNNER_TEMP/verify/Belfry.app/Contents/MacOS/Belfry"

      - name: Upload the build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Belfry-${{ steps.v.outputs.version }}
          path: Belfry-${{ steps.v.outputs.version }}.zip
          if-no-files-found: error

      - name: Tag
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Belfry $VERSION"
          git push origin "v$VERSION"

      - name: Create the GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ steps.v.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/release_notes.sh "$VERSION" > "$RUNNER_TEMP/notes.md"
          gh release create "v$VERSION" "Belfry-$VERSION.zip" \
              --title "Belfry $VERSION" \
              --notes-file "$RUNNER_TEMP/notes.md"

      # After the release exists: the cask URL points at the asset.
      - name: Bump the Homebrew cask
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ steps.v.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          TAP="$RUNNER_TEMP/homebrew-belfry"
          git clone --quiet "https://x-access-token:$TAP_TOKEN@github.com/robgough/homebrew-belfry.git" "$TAP"
          git -C "$TAP" config user.name "github-actions[bot]"
          git -C "$TAP" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BELFRY_TAP="$TAP" scripts/update_cask.sh "$VERSION"

      - name: Say what's left to do
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          {
            echo "## Belfry $VERSION is released"
            echo ""
            echo "Done: notarized + stapled build, tag \`v$VERSION\`, GitHub release, Homebrew cask."
            echo ""
            echo "**Sparkle users don't see it yet.** The appcast is signed with the EdDSA key,"
            echo "which lives on your Mac and not here — that's what stops repo write alone from"
            echo "pushing a signed auto-update. Finish it with:"
            echo ""
            echo '```sh'
            echo "git pull && ./scripts/publish_appcast.sh $VERSION"
            echo '```'
            echo ""
            echo "It fetches the exact asset this run published, signs it, pushes the feed and"
            echo "asks Pages to rebuild."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up credentials
        if: always()
        run: |
          security delete-keychain "${KEYCHAIN:-}" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/asc.p8" "$RUNNER_TEMP/cert.p12" || true
