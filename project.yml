# xcodegen manifest for the iOS app target. The macOS app stays pure SPM
# (`swift build` / scripts/make_app.sh); this exists only because SPM can't
# produce iOS app bundles. Regenerate the project with:
#     xcodegen generate
# then build/run BelfryiOS in Xcode (add your team for device installs) or:
#     xcodebuild -project BelfryiOS.xcodeproj -scheme BelfryiOS \
#       -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M5)' build
name: BelfryiOS
options:
  bundleIdPrefix: net.robgough
packages:
  Termini:
    path: vendor/Termini
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.13.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.0"
targets:
  BelfryiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # BelfryKit is the shared core, compiled directly into each app target
      # (single module per app — see Package.swift for the macOS twin).
      - Sources/BelfryKit
      - Sources/BelfryiOS
      # Maple Mono NF (OFL): nerd-font glyphs for prompts/TUIs. Registered at
      # launch via CoreText (no Info.plist UIAppFonts needed).
      - path: Resources/Fonts
        buildPhase: resources
      # App icon (belfry-1024.png flattened onto the theme background —
      # iOS icons must not carry an alpha channel).
      - path: Resources/BelfryiOS.xcassets
    dependencies:
      - package: Termini
        product: Termini
      - package: Termini
        product: TerminiSSH
      - package: SwiftTerm
        product: SwiftTerm
      - package: Highlightr
        product: Highlightr
    # Downloads land in the app's Documents folder; these two surface it in
    # the Files app (and let other apps open those documents in place).
    # They ride a partial Info.plist merged with the generated one because
    # UIFileSharingEnabled has no INFOPLIST_KEY_* build-setting mapping.
    info:
      path: Resources/BelfryiOS-Info.plist
      properties:
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    preBuildScripts:
      # Guard against a stale generated project: fail the build (with a clear
      # message) if a Swift file was added/renamed under the target's source
      # dirs without re-running `xcodegen generate`. Otherwise the missing file
      # surfaces as a confusing "Cannot find type X in scope" error.
      - name: Check project is in sync with sources
        script: '"$SRCROOT/scripts/check-project-sync.sh"'
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_NAME: Belfry
        # Deliberately distinct from the macOS app's net.robgough.belfry —
        # the Mac app can't ever ship via the App Store (sandbox vs local
        # tmux/PTY/launchd), so there's no universal-purchase record to
        # share, and distinct IDs avoid Launch Services collisions if the
        # iPad app ever runs on Macs alongside the direct-download app.
        PRODUCT_BUNDLE_IDENTIFIER: net.robgough.belfry.ios
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5Z5EG95CQL
        # Version/build defaults for Xcode-GUI builds; scripts/release_ios.sh
        # overrides both at archive time (build = git rev-list --count HEAD,
        # same scheme as the macOS app).
        MARKETING_VERSION: "2026.07.1"
        CURRENT_PROJECT_VERSION: "1"
        # Export compliance: only standard, exempt encryption (SSH via
        # SwiftNIO SSH / CryptoKit) — lets TestFlight builds skip the
        # per-build compliance questionnaire.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        # GhosttyKit.xcframework (via Termini) ships no x86_64 simulator
        # slice, so Intel-simulator builds can't link. Device archives are
        # arm64-only and unaffected.
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
